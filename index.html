<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat como WhatsApp</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #075e54;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message .username {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
        }
        .message.received {
            background-color: white;
            align-self: flex-start;
        }
        .input-container {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            margin-right: 10px;
        }
        .input-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #25d366;
            color: white;
            cursor: pointer;
        }
        .input-container button:hover {
            background-color: #128c7e;
        }
    </script>
</head>
<body>
    <div class="header">
        <h1>Chat Global</h1>
        <input type="text" id="usernameInput" placeholder="Tu nombre..." style="padding: 5px; border-radius: 5px; border: none; margin-top: 5px;">
    </div>
    <div class="chat-container" id="chatContainer">
        <!-- Mensajes se agregarán aquí -->
    </div>
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Escribe un mensaje...">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const socket = io();
        const STORAGE_KEY = 'chatMessages';

        function getSavedMessages() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (err) {
                console.error('Error al leer mensajes guardados:', err);
                return [];
            }
        }

        function saveMessages(messages) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            } catch (err) {
                console.error('Error al guardar mensajes:', err);
            }
        }

        function renderMessage(data) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            const usernameDiv = document.createElement('div');
            usernameDiv.className = 'username';
            usernameDiv.textContent = data.username;
            messageDiv.appendChild(usernameDiv);
            messageDiv.appendChild(document.createTextNode(data.message));
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const usernameInput = document.getElementById('usernameInput');
            const message = input.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';
            if (message) {
                const newMessage = { username, message };
                socket.emit('chat message', newMessage);
                renderMessage(newMessage);
                const messages = getSavedMessages();
                messages.push(newMessage);
                saveMessages(messages);
                input.value = '';
            }
        }

        socket.on('chat message', (data) => {
            renderMessage(data);
            const messages = getSavedMessages();
            messages.push(data);
            saveMessages(messages);
        });

        socket.on('load messages', (loadedMessages) => {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = '';
            loadedMessages.forEach(renderMessage);
        });

        document.addEventListener('DOMContentLoaded', () => {
            getSavedMessages().forEach(renderMessage);
        });

        // Permitir enviar con Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
