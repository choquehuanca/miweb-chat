<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat como WhatsApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #075e54;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message .username {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
        }
        .message.received {
            background-color: white;
            align-self: flex-start;
        }
        .input-container {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            margin-right: 10px;
        }
        .input-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #25d366;
            color: white;
            cursor: pointer;
        }
        .input-container button:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chat Global</h1>
        <div id="status" style="font-size: 12px; color: #ffd700;">Conectando...</div>
        <input type="text" id="usernameInput" placeholder="Tu nombre..." style="padding: 5px; border-radius: 5px; border: none; margin-top: 5px;">
    </div>
    <div class="chat-container" id="chatContainer">
        <div id="no-messages" style="text-align: center; color: #777; margin-top: 20px;">Esperando mensajes...</div>
    </div>
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Escribe un mensaje...">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <!-- Movido al final para evitar bloqueo de carga -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 1. Verificación de seguridad: ¿Se abrió como archivo local?
        if (window.location.protocol === 'file:') {
            alert('¡Error! Has abierto el HTML como un archivo local. El chat solo funciona si entras por la URL de Railway o http://localhost:3000');
        }

        // 2. Intentar inicializar Socket.io
        const socket = typeof io !== 'undefined' ? io() : null;
        const statusDiv = document.getElementById('status');
        const chatContainer = document.getElementById('chatContainer');

        if (!socket) {
            statusDiv.textContent = 'Error: No se pudo conectar con el servidor (Socket.io no cargado)';
            statusDiv.style.color = '#ff5252';
        } else {
            socket.on('connect', () => {
                statusDiv.textContent = 'Conectado';
                statusDiv.style.color = '#25d366';
            });

            socket.on('disconnect', () => {
                statusDiv.textContent = 'Desconectado';
                statusDiv.style.color = '#ff5252';
            });
        }

        function renderMessage(data) {
            const noMessages = document.getElementById('no-messages');
            if (noMessages) noMessages.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            const usernameDiv = document.createElement('div');
            usernameDiv.className = 'username';
            usernameDiv.textContent = data.username;
            messageDiv.appendChild(usernameDiv);
            messageDiv.appendChild(document.createTextNode(data.message));
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage() {
            if (!socket) return alert('No hay conexión con el servidor');
            const input = document.getElementById('messageInput');
            const usernameInput = document.getElementById('usernameInput');
            const message = input.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';
            if (message) {
                const newMessage = { username, message };
                socket.emit('chat message', newMessage);
                input.value = '';
            }
        }

        if (socket) {
            socket.on('chat message', (data) => {
                renderMessage(data);
            });

            socket.on('load messages', (loadedMessages) => {
                chatContainer.innerHTML = '';
                if (loadedMessages.length === 0) {
                    chatContainer.innerHTML = '<div id="no-messages" style="text-align: center; color: #777; margin-top: 20px;">No hay mensajes aún. ¡Sé el primero!</div>';
                } else {
                    loadedMessages.forEach(renderMessage);
                }
            });
        }

        // Permitir enviar con Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
