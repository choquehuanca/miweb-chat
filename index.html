<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat como WhatsApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #main-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        /* Área del Juego */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            transition: margin-right 0.3s ease;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            background-color: #075e54;
            padding: 10px;
            border-radius: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        .cell:hover { background-color: #f9f9f9; }
        
        /* Chat Lateral */
        #chat-sidebar {
            width: 350px;
            height: 100%;
            background-color: #fff;
            position: absolute;
            right: -350px;
            top: 0;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            z-index: 100;
        }
        #chat-sidebar.open { right: 0; }

        .header {
            background-color: #075e54;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message .username {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
        }
        .message.received {
            background-color: white;
            align-self: flex-start;
        }
        .input-container {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            margin-right: 10px;
        }
        .input-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #25d366;
            color: white;
            cursor: pointer;
        }
        .input-container button:hover {
            background-color: #128c7e;
        }
        
        /* Botón para deslizar chat */
        #chat-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
            z-index: 101;
            padding: 10px 20px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="chat-toggle" onclick="toggleChat()">💬 Abrir Chat</button>
    
    <div id="main-wrapper">
        <div id="game-area">
            <h2>Tres en Raya Online</h2>
            <div id="game-info" style="margin-bottom: 20px;">Esperando jugadores...</div>
            <div class="board" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
            <button onclick="joinGame()" id="btnJoin" style="margin-top:20px; padding:10px;">Jugar ahora</button>
        </div>

        <div id="chat-sidebar">
            <div class="header">
                <h3>Chat Global</h3>
                <div id="status" style="font-size: 11px; color: #ffd700;">Conectando...</div>
                <input type="text" id="usernameInput" placeholder="Tu nombre..." style="width: 80%; padding: 5px; border-radius: 5px; border: none;">
            </div>
            <div class="chat-container" id="chatContainer"></div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Mensaje...">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = typeof io !== 'undefined' ? io() : null;
        const chatContainer = document.getElementById('chatContainer');

        if (!socket) {
            statusDiv.textContent = 'Error: No se pudo conectar con el servidor (Socket.io no cargado)';
            statusDiv.style.color = '#ff5252';
        } else {
            socket.on('connect', () => {
                statusDiv.textContent = 'Conectado';
                statusDiv.style.color = '#25d366';
            });

            socket.on('disconnect', () => {
                statusDiv.textContent = 'Desconectado';
                statusDiv.style.color = '#ff5252';
            });
        }

        // Lógica de Interfaz
        function toggleChat() {
            const sidebar = document.getElementById('chat-sidebar');
            sidebar.classList.toggle('open');
            document.getElementById('chat-toggle').textContent = sidebar.classList.contains('open') ? '❌ Cerrar Chat' : '💬 Abrir Chat';
        }

        // Lógica del Juego
        let mySymbol = null;
        function joinGame() {
            const name = document.getElementById('usernameInput').value || 'Anónimo';
            socket.emit('join game', name);
            document.getElementById('btnJoin').style.display = 'none';
        }

        function makeMove(idx) {
            if (mySymbol) socket.emit('make move', idx);
        }

        socket.on('player assigned', (symbol) => { mySymbol = symbol; });

        socket.on('game update', (data) => {
            const cells = document.querySelectorAll('.cell');
            data.board.forEach((val, i) => { cells[i].textContent = val; });
            
            const info = document.getElementById('game-info');
            if (data.players.length < 2) {
                info.textContent = "Esperando al segundo jugador...";
            } else {
                const turnName = data.xIsNext ? 'X' : 'O';
                info.textContent = `Turno de: ${turnName} ${mySymbol === turnName ? '(Tú)' : ''}`;
            }
        });

        // Lógica de Chat
        function renderMessage(data) {
            const noMessages = document.getElementById('no-messages');
            if (noMessages) noMessages.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            const usernameDiv = document.createElement('div');
            usernameDiv.className = 'username';
            usernameDiv.textContent = data.username;
            messageDiv.appendChild(usernameDiv);
            messageDiv.appendChild(document.createTextNode(data.message));
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage() {
            if (!socket) return alert('No hay conexión con el servidor');
            const input = document.getElementById('messageInput');
            const usernameInput = document.getElementById('usernameInput');
            const message = input.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';
            if (message) {
                const newMessage = { username, message };
                socket.emit('chat message', newMessage);
                input.value = '';
            }
        }

        if (socket) {
            socket.on('chat message', (data) => {
                renderMessage(data);
            });

            socket.on('load messages', (loadedMessages) => {
                chatContainer.innerHTML = '';
                if (loadedMessages.length === 0) {
                    chatContainer.innerHTML = '<div id="no-messages" style="text-align: center; color: #777; margin-top: 20px;">No hay mensajes aún. ¡Sé el primero!</div>';
                } else {
                    loadedMessages.forEach(renderMessage);
                }
            });
        }

        // Permitir enviar con Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
